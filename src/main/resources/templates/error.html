<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head('Error')}"></head>
<body class="bg-light">

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm">
                <div class="card-body py-5">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                    <h2 class="mt-3" th:text="${status}">Error</h2>
                    <p class="text-muted" th:text="${message}">Something went wrong.</p>
                    <a href="/files" class="btn btn-primary mt-2">
                        <i class="bi bi-arrow-left me-1"></i>Back to Files
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
