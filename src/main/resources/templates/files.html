<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head('Files')}"></head>
<body class="bg-light">

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">All Files</h4>
        <a href="/files/upload" class="btn btn-primary btn-sm">
            <i class="bi bi-upload me-1"></i>Upload
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Size</th>
                        <th>Uploaded</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(files)}">
                        <td colspan="5" class="text-center text-muted py-4">No files uploaded yet.</td>
                    </tr>
                    <tr th:each="file : ${files}">
                        <td class="align-middle">
                            <i class="bi bi-file-earmark me-1 text-secondary"></i>
                            <span th:text="${file.originalName}"></span>
                        </td>
                        <td class="align-middle text-muted" th:text="${file.contentType}"></td>
                        <td class="align-middle text-muted" th:text="${#numbers.formatDecimal(file.size / 1024.0, 1, 1)} + ' KB'"></td>
                        <td class="align-middle text-muted" th:text="${#temporals.format(file.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="align-middle text-end">
                            <a th:href="@{/files/{id}/download(id=${file.id})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-download"></i>
                            </a>
                            <form th:action="@{/files/{id}/delete(id=${file.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this file?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
